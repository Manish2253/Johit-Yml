name: 'Terraform - Multi Env Deployment'

on:
  workflow_dispatch:
    inputs:
      infra_env:
        description: 'Choose Environment'
        required: true
        default: 'sandbox'
        type: choice
        options:
          - sandbox
          - nonprod
          - prod
      add_adgroup:
        description: 'Add AD Group to Local Admin?'
        required: true
        default: 'no'
        type: choice
        options:
          - yes
          - no

env:
  APP_ID: RITM031323

jobs:
  terraform:
    name: Terraform Plan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Terrascan Security Scan
        uses: accurics/terrascan-action@v1
        with:
          iac_type: terraform
          policy_type: azure
        continue-on-error: true

      - name: Set Environment
        id: set-env
        run: |
          ENV=${{ github.event.inputs.infra_env }}
          echo "ENV=$ENV" >> $GITHUB_ENV
          if [ "$ENV" = "sandbox" ]; then
            echo "ARM_CLIENT_ID=${{ secrets.CEQ_AZURE_SANDBOX01_TF_ARM_CLIENT_ID }}" >> $GITHUB_ENV
            echo "ARM_CLIENT_SECRET=${{ secrets.CEQ_AZURE_SANDBOX01_TF_ARM_CLIENT_SECRET }}" >> $GITHUB_ENV
            echo "ARM_SUBSCRIPTION_ID=${{ secrets.CEQ_AZURE_SANDBOX01_TF_ARM_SUBS_ID }}" >> $GITHUB_ENV
            echo "ARM_TENANT_ID=${{ secrets.CEQ_AZURE_SANDBOX01_TF_ARM_TENANT_ID }}" >> $GITHUB_ENV
            echo "TFSTATE_RG=MCD-POST-TASK-TEST-CEQ" >> $GITHUB_ENV
            echo "TFSTATE_STORAGE_ACCOUNT=mcdmacfeeinstaller" >> $GITHUB_ENV
          elif [ "$ENV" = "nonprod" ]; then
            echo "ARM_CLIENT_ID=${{ secrets.CEQ_AZURE_GITHUB_NON_PROD_TF_ARM_CLIENT_ID }}" >> $GITHUB_ENV
            echo "ARM_CLIENT_SECRET=${{ secrets.CEQ_AZURE_GITHUB_NON_PROD_TF_ARM_CLIENT_SECRET }}" >> $GITHUB_ENV
            echo "ARM_SUBSCRIPTION_ID=${{ secrets.CEQ_AZURE_GITHUB_NON_PROD_TF_ARM_SUBS_ID }}" >> $GITHUB_ENV
            echo "ARM_TENANT_ID=${{ secrets.CEQ_AZURE_GITHUB_NON_PROD_TF_ARM_TENANT_ID }}" >> $GITHUB_ENV
            echo "TFSTATE_RG=ceq-vm-provissioning-tfstate" >> $GITHUB_ENV
            echo "TFSTATE_STORAGE_ACCOUNT=ceqvmtfstatenonprod" >> $GITHUB_ENV
          else
            echo "ARM_CLIENT_ID=${{ secrets.CEQ_AZURE_GITHUB_PROD01_TF_ARM_CLIENT_ID }}" >> $GITHUB_ENV
            echo "ARM_CLIENT_SECRET=${{ secrets.CEQ_AZURE_GITHUB_PROD01_TF_ARM_CLIENT_SECRET }}" >> $GITHUB_ENV
            echo "ARM_SUBSCRIPTION_ID=${{ secrets.CEQ_AZURE_GITHUB_PROD01_TF_ARM_SUBS_ID }}" >> $GITHUB_ENV
            echo "ARM_TENANT_ID=${{ secrets.CEQ_AZURE_GITHUB_PROD01_TF_ARM_TENANT_ID }}" >> $GITHUB_ENV
            echo "TFSTATE_RG=RG-2W-IMAGE-PROD" >> $GITHUB_ENV
            echo "TFSTATE_STORAGE_ACCOUNT=mcdposttaskprodstorage" >> $GITHUB_ENV
          fi
          echo "TFSTATE_CONTAINER=tfstate" >> $GITHUB_ENV

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ env.ARM_CLIENT_ID }}","clientSecret":"${{ env.ARM_CLIENT_SECRET }}","subscriptionId":"${{ env.ARM_SUBSCRIPTION_ID }}","tenantId":"${{ env.ARM_TENANT_ID }}"}'

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.x"

      - name: Terraform Init
        run: terraform init -reconfigure -force-copy -backend-config="resource_group_name=${{ env.TFSTATE_RG }}" -backend-config="storage_account_name=${{ env.TFSTATE_STORAGE_ACCOUNT }}" -backend-config="container_name=${{ env.TFSTATE_CONTAINER }}" -backend-config="key=${{ env.ENV }}-${{ env.APP_ID }}.tfstate"

      - name: Terraform Plan
        run: terraform plan -var-file="${{ env.ENV }}/terraform.tfvars"

  terraformApply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: terraform
    environment: terraform_apply

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Environment
        run: echo "ENV=${{ github.event.inputs.infra_env }}" >> $GITHUB_ENV   # Reuse same logic as above

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ env.ARM_CLIENT_ID }}","clientSecret":"${{ env.ARM_CLIENT_SECRET }}","subscriptionId":"${{ env.ARM_SUBSCRIPTION_ID }}","tenantId":"${{ env.ARM_TENANT_ID }}"}'

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.x"

      - name: Terraform Init
        run: terraform init -reconfigure -force-copy -backend-config=...   # Same as above

      - name: Terraform Apply
        run: terraform apply -auto-approve -var-file="${{ env.ENV }}/terraform.tfvars"
