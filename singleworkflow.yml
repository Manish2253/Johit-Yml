    - name: convert win.csv
      shell: pwsh
      run: |
        $vm_name = Get-Content win.ps1
        if ($null -eq $vm_name) {
            new-item .\win.csv -force
        }else {
            $lastcount=$vm_name.count-1
            $target=@{}
            for ($i=3; $i -lt $lastcount; $i++) {
                $vm_name1= $null
                $vm_name1=$vm_name[$i].split(" ")
                $target.Add($vm_name1[0],$vm_name1[$vm_name1.count-1])
            }
            $target.GetEnumerator() | Select-Object -Property key, value | Export-Csv -NoTypeInformation -Path .\window.csv
            Get-Content -Path .\window.csv | Select-Object -Skip 1 | Add-Content -Path .\win.csv
        }

    - name: Upload win.csv file
      uses: actions/upload-artifact@v2
      with:
        name: win.csv
        path: win.csv
     

  Uploading_CSV_to_Azure_Storage: 
    name: 'Finishing up'
    runs-on: ubuntu-latest
    if: always()
    needs: ["Linux_Post_Provisioning","Window_Post_Provisioning"]
    defaults:
      run:
        shell: bash
        
    steps:
    - name: Checkout
      uses: actions/checkout@v2
              
    - id: lnx_csv
      name: Download lnx.csv file
      uses: actions/download-artifact@v2
      with:
        name: lnx.csv
      continue-on-error: true
        
    - id: win_csv
      name: Download win.csv file
      uses: actions/download-artifact@v2
      with:
        name: win.csv
      continue-on-error: true

    - name: csv file downlod
      uses: actions/download-artifact@v2
      with:
        name: csv_file
      
    - name: "Setting Environment"
      env:
        SANDBOX_ENV: ${{ github.event.inputs.infra_env == 'sandbox' }}
        NONPROD_ENV: ${{ github.event.inputs.infra_env == 'nonprod' }}
        PROD_ENV: ${{ github.event.inputs.infra_env == 'prod' }}
      run: |
        if ${SANDBOX_ENV} == true; then
          echo "ARM_CLIENT_ID=${{secrets.CEQ_AZURE_SANDBOX01_TF_ARM_CLIENT_ID}}" >> $GITHUB_ENV
          echo "ARM_CLIENT_SECRET=${{secrets.CEQ_AZURE_SANDBOX01_TF_ARM_CLIENT_SECRET}}" >> $GITHUB_ENV
          echo "ARM_SUBSCRIPTION_ID=${{secrets.CEQ_AZURE_SANDBOX01_TF_ARM_SUBS_ID}}" >> $GITHUB_ENV
          echo "ARM_TENANT_ID=${{secrets.CEQ_AZURE_SANDBOX01_TF_ARM_TENANT_ID}}" >> $GITHUB_ENV
          echo "TFSTATE_RG=MCD-POST-TASK-TEST-CEQ" >> $GITHUB_ENV
          echo "TFSTATE_STORAGE_ACCOUNT=mcdmacfeeinstaller" >> $GITHUB_ENV
          echo "TFSTATE_CONTAINER=tfstate" >> $GITHUB_ENV
          echo "ENV=sandbox" >> $GITHUB_ENV
        elif ${PROD_ENV} == true;
        then
          echo "ARM_CLIENT_ID=${{secrets.CEQ_AZURE_GITHUB_PROD01_TF_ARM_CLIENT_ID}}" >> $GITHUB_ENV
          echo "ARM_CLIENT_SECRET=${{secrets.CEQ_AZURE_GITHUB_PROD01_TF_ARM_CLIENT_SECRET}}" >> $GITHUB_ENV
          echo "ARM_SUBSCRIPTION_ID=${{secrets.CEQ_AZURE_GITHUB_PROD01_TF_ARM_SUBS_ID}}" >> $GITHUB_ENV
          echo "ARM_TENANT_ID=${{secrets.CEQ_AZURE_GITHUB_PROD01_TF_ARM_TENANT_ID}}" >> $GITHUB_ENV
          echo "TFSTATE_RG=RG-2W-IMAGE-PROD" >> $GITHUB_ENV
          echo "TFSTATE_STORAGE_ACCOUNT=mcdposttaskprodstorage" >> $GITHUB_ENV
          echo "TFSTATE_CONTAINER=tfstate" >> $GITHUB_ENV
          echo "ENV=prod" >> $GITHUB_ENV
        elif ${NONPROD_ENV} == true;
        then
          echo "ARM_CLIENT_ID=${{secrets.CEQ_AZURE_GITHUB_NON_PROD_TF_ARM_CLIENT_ID}}" >> $GITHUB_ENV
          echo "ARM_CLIENT_SECRET=${{secrets.CEQ_AZURE_GITHUB_NON_PROD_TF_ARM_CLIENT_SECRET}}" >> $GITHUB_ENV
          echo "ARM_SUBSCRIPTION_ID=${{secrets.CEQ_AZURE_GITHUB_NON_PROD_TF_ARM_SUBS_ID}}" >> $GITHUB_ENV
          echo "ARM_TENANT_ID=${{secrets.CEQ_AZURE_GITHUB_NON_PROD_TF_ARM_TENANT_ID}}" >> $GITHUB_ENV
          echo "TFSTATE_RG=ceq-vm-provissioning-tfstate" >> $GITHUB_ENV
          echo "TFSTATE_STORAGE_ACCOUNT=ceqvmtfstatenonprod" >> $GITHUB_ENV
          echo "TFSTATE_CONTAINER=tfstate" >> $GITHUB_ENV
          echo "ENV=nonprod" >> $GITHUB_ENV
        else
          echo "environment not supported"
          Exit 1
        fi
      
#     - name: Login to azure
#       uses: azure/login@v1
#       with:
#          creds: '{"clientId":"${{ env.ARM_CLIENT_ID }}","clientSecret":"${{ env.ARM_CLIENT_SECRET }}","subscriptionId":"${{ env.ARM_SUBSCRIPTION_ID }}","tenantId":"${{ env.ARM_TENANT_ID }}"}'
#          enable-AzPSSession: true
         
      
    - name: Upload -final CSV FIle
      uses: azure/powershell@v1
      with:
        inlineScript: |
          . .\${{env.ENV}}\Post-Provisioning-variables.ps1
          $date=(get-date).AddMinutes(10).ToString("HH:mm");
          [string][ValidateNotNullOrEmpty()] $SecuredPassword= "${{ env.ARM_CLIENT_SECRET }}"
          $SecuredPassword1 = ConvertTo-SecureString -String $SecuredPassword -AsPlainText -Force
          $Credential = New-Object -TypeName System.Management.Automation.PSCredential -ArgumentList ${{ env.ARM_CLIENT_ID }}, $SecuredPassword1
          Connect-AzAccount -ServicePrincipal -TenantId ${{ env.ARM_TENANT_ID }} -Credential $Credential
          $storage_account = New-AzStorageContext -StorageAccountName "$sentinal_storageaccount" -UseConnectedAccount;
          if ( '${{ steps.lnx_csv.outcome }}' -ne 'failure') {
          Get-Content -Path lnx.csv | Add-Content -Path .\${{env.ENV}}-${{env.APP_ID}}.csv 
          }
          if ( '${{ steps.win_csv.outcome }}' -ne 'failure') {
          Get-Content -Path win.csv | Add-Content -Path .\${{env.ENV}}-${{env.APP_ID}}.csv
          }
          Get-Content -Path  .\${{env.ENV}}-${{env.APP_ID}}.csv
          Set-AzStorageBlobContent -File .\${{env.ENV}}-${{env.APP_ID}}.csv  -Container $pp_container -Context $storage_account -force
        azPSVersion: '5.0.0'
      continue-on-error: true
      
