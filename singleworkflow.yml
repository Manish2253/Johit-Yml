    - name: Sentinal Install
      env:
        SANDBOX_ENV: ${{ github.event.inputs.infra_env == 'sandbox' }}
        NONPROD_ENV: ${{ github.event.inputs.infra_env == 'nonprod' }}
        PROD_ENV: ${{ github.event.inputs.infra_env == 'prod' }}
      uses: azure/powershell@v1
      with:
        inlineScript: |
         if (("${{env.PROD_ENV}}" -eq "true") -or ("${{env.NONPROD_ENV}}" -eq "true")) {
              . .\${{env.ENV}}\Post-Provisioning-variables.ps1
              $date=(get-date).AddMinutes(60).ToString("HH:mm");
              $storage_account = New-AzStorageContext -StorageAccountName "$sentinal_storageaccount" -UseConnectedAccount;
              $account_sas = New-AzStorageContainerSASToken -Context $storage_account  -Name "$sentinal_container_name" -Permission r -ExpiryTime $date;
              $script = get-content "./provisioning/SentinelInstall.ps1" -raw
              'param($storageaccount,$storagecontainer,$storageblobname,$sentinal_token,$region)'+"`n "+"$"+"sas_token=" + "`"" +"$account_sas" + "`""  +"`n$script" |Out-File "./provisioning/SentinelInstall.ps1"
              $vm_name = Get-Content win.ps1
              $lastcount=$vm_name.count-1
              $target=@{}
              for ($i=3; $i -lt $lastcount; $i++) {
                  $vm_name1= $null
                  $vm_name1=$vm_name[$i].split(" ")
                  $target.Add($vm_name1[0],$vm_name1[$vm_name1.count-1])
              }
              $target.GetEnumerator() | ForEach-Object{
              $azParmsSentinelInstall = @{
                ResourceGroupName = $_.Value
                VMName = $_.Key
                CommandId = "RunPowerShellScript"
                ScriptPath = "./provisioning/SentinelInstall.ps1"
              }
              $azvm= Get-AzVM -ResourceGroupName $_.Value -Name $_.Key
              $region = $azvm.Location 
              Write-Output $region
              if ("${{env.PROD_ENV}}" -eq "true") {
              $sentinal_prod_token = Get-AzKeyVaultSecret -VaultName 'KV-2W-ImgFactory-Prod' -Name 'sentinel-prod' -AsPlainText
              Invoke-AzVMRunCommand @azParmsSentinelInstall -Parameter @{storageblobname = "$sentinal_storageblobname_window"; storageaccount = "$sentinal_storageaccount";storagecontainer="$sentinal_container_name"; sentinal_token = "$sentinal_prod_token"; region = "$region";}
              }else{
              $sentinal_nonprod_token= Get-AzKeyVaultSecret -VaultName 'KV-2W-ImgFactory-NonProd' -Name 'sentinel-nonprod' -AsPlainText
              Invoke-AzVMRunCommand @azParmsSentinelInstall -Parameter @{storageblobname = "$sentinal_storageblobname_window"; storageaccount = "$sentinal_storageaccount";storagecontainer="$sentinal_container_name"; sentinal_token = "$sentinal_nonprod_token"; region = "$region";}
              }
              }
          }
        azPSVersion: '5.0.0'


